version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0:8000"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: db_avito
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL_MODE: disable
      SECRET_KEY: secret_key
    depends_on:
      db:
        condition: service_healthy
    networks:
      - e2e-network

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: db_avito
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s      
      timeout: 5s       
      retries: 10     
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - e2e-network

volumes:
  postgres_data:

networks:
  e2e-network:
    driver: bridge